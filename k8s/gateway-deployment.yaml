apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: kirogate
  labels:
    app: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: kirogate/gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: KIROGATE_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: KIROGATE_AGENT_TOKEN
            - name: KIROGATE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: KIROGATE_JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: DATABASE_URL
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: kirogate
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: kirogate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
