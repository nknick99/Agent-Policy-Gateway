# Backend — the modular monolith (gateway + auth + agent APIs in one image).
# Multi-replica is correct because session/quota state is shared in Redis
# (APG_REDIS_URL); see redis.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: agent-policy-gateway
  labels:
    app: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: apg/backend:latest
          ports:
            - containerPort: 8000
          env:
            # Shared session/quota state — required for correct quotas across
            # replicas (defect D7).
            - name: APG_REDIS_URL
              value: "redis://redis:6379/0"
            - name: APG_MODE
              value: "enforce"
            - name: APG_OPERATOR_EMAIL
              value: "admin@apg.dev"
            - name: APG_OPERATOR_WORKSPACE
              value: "apg"
            - name: APG_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: APG_AGENT_TOKEN
            - name: APG_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: APG_JWT_SECRET
            - name: APG_OPERATOR_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: APG_OPERATOR_PASSWORD_HASH
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: agent-policy-gateway
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: agent-policy-gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
