apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: agent-policy-gateway
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: apg/auth:latest
          ports:
            - containerPort: 8001
          env:
            - name: APG_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: APG_AGENT_TOKEN
            - name: APG_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: APG_JWT_SECRET
            - name: APG_OPERATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: APG_OPERATOR_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: apg-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: agent-policy-gateway
spec:
  selector:
    app: auth
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
