apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: kirogate
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: kirogate/auth:latest
          ports:
            - containerPort: 8001
          env:
            - name: KIROGATE_AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: KIROGATE_AGENT_TOKEN
            - name: KIROGATE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: KIROGATE_JWT_SECRET
            - name: KIROGATE_OPERATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: KIROGATE_OPERATOR_PASSWORD
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kirogate-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: kirogate
spec:
  selector:
    app: auth
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
