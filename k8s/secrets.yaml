# Replace every value before deploying. Generate the operator password hash
# with `apg hash-password` (argon2 — no plaintext passwords in cluster secrets).
apiVersion: v1
kind: Secret
metadata:
  name: apg-secrets
  namespace: agent-policy-gateway
type: Opaque
stringData:
  APG_AGENT_TOKEN: "CHANGE-ME-IN-PRODUCTION"
  APG_JWT_SECRET: "CHANGE-ME-USE-256-BIT-KEY"
  APG_OPERATOR_PASSWORD_HASH: "CHANGE-ME-RUN-apg-hash-password"
  DATABASE_URL: "postgresql://apg:apg@postgres:5432/apg"
